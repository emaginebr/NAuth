name: Deploy Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        key: ${{ secrets.PROD_SSH_KEY }}
        port: ${{ secrets.PROD_SSH_PORT || 22 }}
        script: |
          set -e

          DEPLOY_DIR="/opt/nauth"
          REPO_URL="https://github.com/${{ github.repository }}.git"
          BRANCH="main"

          # Clone or update repository
          if [ -d "$DEPLOY_DIR" ]; then
            echo "Updating existing repository..."
            cd "$DEPLOY_DIR"
            git fetch origin
            git reset --hard "origin/$BRANCH"
            git clean -fd
          else
            echo "Cloning repository..."
            git clone --branch "$BRANCH" --single-branch "$REPO_URL" "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
          fi

          # Inject .env from GitHub Secrets
          cat > .env <<'ENVEOF'
          # PostgreSQL
          POSTGRES_DB=${{ secrets.PROD_POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
          POSTGRES_PORT=${{ secrets.PROD_POSTGRES_PORT }}

          # Tenant Databases
          NAUTH_DB=${{ secrets.PROD_NAUTH_DB }}
          VIRALT_DB=${{ secrets.PROD_VIRALT_DB }}

          # Default Tenant
          DEFAULT_TENANT_ID=${{ secrets.PROD_DEFAULT_TENANT_ID }}

          # JWT
          JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
          NAUTH_JWT_SECRET=${{ secrets.PROD_NAUTH_JWT_SECRET }}
          VIRALT_JWT_SECRET=${{ secrets.PROD_VIRALT_JWT_SECRET }}

          # API
          API_HTTP_PORT=${{ secrets.PROD_API_HTTP_PORT }}
          API_HTTPS_PORT=${{ secrets.PROD_API_HTTPS_PORT }}
          CERTIFICATE_PASSWORD=${{ secrets.PROD_CERTIFICATE_PASSWORD }}

          # External Services
          ZTOOL_API_URL=${{ secrets.PROD_ZTOOL_API_URL }}
          BUCKET_NAME=${{ secrets.PROD_BUCKET_NAME }}
          ENVEOF

          # Remove leading whitespace from .env
          sed -i 's/^[[:space:]]*//' .env

          # Create external network if it doesn't exist
          docker network inspect emagine-network >/dev/null 2>&1 || docker network create emagine-network

          # Deploy with docker compose
          docker compose -f docker-compose-prod.yml down
          docker compose -f docker-compose-prod.yml up --build -d

          # Wait and verify
          echo "Waiting for services to start..."
          sleep 10
          docker compose -f docker-compose-prod.yml ps

          echo "Deployment completed successfully."

    - name: Summary
      run: |
        echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Server: \`${{ secrets.PROD_SSH_HOST }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Branch: \`main\`" >> $GITHUB_STEP_SUMMARY
        echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Triggered by: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
